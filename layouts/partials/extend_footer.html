{{- /* TOC scroll-spy: highlights active h2/h3 in both sidebar and content */ -}}
<script>
(function () {
  var toc = document.getElementById('TableOfContents');
  if (!toc) return;

  // Keep details always open on wide screens
  var mainDetails = document.querySelector('.toc > details');
  if (mainDetails && window.innerWidth >= 1280) mainDetails.open = true;

  /* ── 1. Wrap nested <ul> in collapsible <details> ──────────── */
  Array.from(toc.querySelectorAll('ul ul')).forEach(function (ul) {
    var parentLi = ul.parentElement;
    if (!parentLi || parentLi.tagName !== 'LI') return;
    var directLink = parentLi.querySelector(':scope > a');
    if (!directLink) return;

    var det = document.createElement('details');
    var sum = document.createElement('summary');
    sum.appendChild(directLink.cloneNode(true));
    det.appendChild(sum);
    det.appendChild(ul);
    directLink.replaceWith(det);
  });

  /* ── 2. Scroll-spy (h2 and h3 only) ───────────────────────── */
  // Only watch h2 and h3 — matches hugo.toml startLevel=2 endLevel=3
  var headings = Array.from(
    document.querySelectorAll('h2[id], h3[id]')
  );
  if (!headings.length) return;

  var links = Array.from(toc.querySelectorAll('a[href^="#"]'));
  var cur   = { link: null, heading: null };

  function activate(heading) {
    if (cur.link)    cur.link.classList.remove('toc-active');
    if (cur.heading) cur.heading.classList.remove('heading-active');

    cur.heading = heading || null;
    cur.link    = null;

    if (!heading) return;

    heading.classList.add('heading-active');

    // Find matching TOC link
    for (var i = 0; i < links.length; i++) {
      var frag = decodeURIComponent((links[i].getAttribute('href') || '').replace(/^#/, ''));
      if (frag === heading.id) { cur.link = links[i]; break; }
    }

    if (cur.link) {
      cur.link.classList.add('toc-active');

      // Auto-open parent <details> so the active item is visible
      var parentDet = cur.link.closest('#TableOfContents details');
      if (parentDet) parentDet.open = true;

      // Scroll TOC panel to keep active link visible
      var panel = document.querySelector('.toc');
      if (panel && window.innerWidth >= 1280) {
        var top = cur.link.offsetTop - panel.clientHeight / 2;
        panel.scrollTop = Math.max(0, top);
      }
    }
  }

  var lastHeading;

  function onScroll() {
    var threshold = window.scrollY + Math.min(140, window.innerHeight * 0.3);
    var found = null;
    for (var i = 0; i < headings.length; i++) {
      if (headings[i].getBoundingClientRect().top + window.scrollY <= threshold) {
        found = headings[i];
      }
    }
    if (found !== lastHeading) {
      lastHeading = found;
      activate(found);
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll(); // run once on load
})();
</script>
