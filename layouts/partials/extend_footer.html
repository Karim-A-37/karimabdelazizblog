{{- /* Scroll-spy: highlights active TOC link AND active heading in post content */ -}}
<script>
(function () {
  var toc = document.getElementById('TableOfContents');
  if (!toc) return;

  // Always keep details open
  var details = document.querySelector('.toc details');
  if (details) details.open = true;

  // All headings that have an id — works regardless of parent container
  var headings = Array.from(document.querySelectorAll('h1[id], h2[id], h3[id], h4[id]'));
  if (!headings.length) return;

  var links = Array.from(toc.querySelectorAll('a[href^="#"]'));
  var cur = { link: null, heading: null };

  function activate(heading) {
    if (cur.link)    { cur.link.classList.remove('toc-active'); }
    if (cur.heading) { cur.heading.classList.remove('heading-active'); }

    cur.heading = heading || null;
    cur.link    = null;

    if (heading) {
      heading.classList.add('heading-active');
      // Match TOC link by decoding the href fragment
      for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href') || '';
        var frag = decodeURIComponent(href.replace(/^#/, ''));
        if (frag === heading.id) { cur.link = links[i]; break; }
      }
      if (cur.link) {
        cur.link.classList.add('toc-active');
        // Keep TOC panel scrolled so active link stays visible
        var panel = document.querySelector('.toc');
        if (panel && window.innerWidth >= 1280) {
          var top = cur.link.offsetTop - panel.clientHeight / 2;
          panel.scrollTop = Math.max(0, top);
        }
      }
    }
  }

  var lastHeading = undefined; // undefined = not initialised yet

  function onScroll() {
    var threshold = window.scrollY + Math.min(130, window.innerHeight * 0.28);
    var found = null;
    for (var i = 0; i < headings.length; i++) {
      var top = headings[i].getBoundingClientRect().top + window.scrollY;
      if (top <= threshold) found = headings[i];
    }
    if (found !== lastHeading) {
      lastHeading = found;
      activate(found);
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll(); // run once immediately on page load
})();
</script>
