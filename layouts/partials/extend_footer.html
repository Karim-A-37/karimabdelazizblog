{{- /* Scroll-spy: highlights active TOC link AND active heading in post content */ -}}
<script>
(function () {
  var toc = document.querySelector('#TableOfContents');
  if (!toc) return;

  // Force details open on wide screens
  var details = document.querySelector('.toc details');
  if (details && window.innerWidth >= 1280) details.open = true;

  var headings = Array.from(
    document.querySelectorAll('.post-content h1, .post-content h2, .post-content h3, .post-content h4')
  );
  if (!headings.length) return;

  var links = Array.from(toc.querySelectorAll('a'));
  var currentLink    = null;
  var currentHeading = null;

  function setActive(heading, link) {
    // Remove from previous
    if (currentLink)    currentLink.classList.remove('toc-active');
    if (currentHeading) currentHeading.classList.remove('heading-active');

    currentLink    = link    || null;
    currentHeading = heading || null;

    // Apply to new
    if (currentLink)    currentLink.classList.add('toc-active');
    if (currentHeading) currentHeading.classList.add('heading-active');

    // Keep TOC panel scrolled to active link
    if (currentLink) {
      var tocPanel = document.querySelector('.toc');
      if (tocPanel) {
        var linkTop = currentLink.offsetTop;
        var panelH  = tocPanel.clientHeight;
        if (linkTop < tocPanel.scrollTop || linkTop > tocPanel.scrollTop + panelH - 40) {
          tocPanel.scrollTop = linkTop - panelH / 2;
        }
      }
    }
  }

  function onScroll() {
    var scrollY       = window.scrollY + 120;
    var activeHeading = null;

    for (var i = 0; i < headings.length; i++) {
      if (headings[i].getBoundingClientRect().top + window.scrollY <= scrollY) {
        activeHeading = headings[i];
      }
    }

    if (activeHeading) {
      var id   = activeHeading.id;
      var link = links.find(function (a) { return a.getAttribute('href') === '#' + id; });
      if (activeHeading !== currentHeading) setActive(activeHeading, link || null);
    } else {
      setActive(null, null);
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
})();
</script>
