(function () {
  var toc = document.querySelector('#TableOfContents');
  if (!toc) return;

  
  var details = document.querySelector('.toc details');
  if (details && window.innerWidth >= 1280) details.open = true;

  var headings = Array.from(
    document.querySelectorAll('.post-content h1, .post-content h2, .post-content h3, .post-content h4')
  );
  if (!headings.length) return;

  var links = Array.from(toc.querySelectorAll('a'));
  var current = null;

  function setActive(link) {
    if (current === link) return;
    if (current) current.classList.remove('toc-active');
    current = link;
    if (current) {
      current.classList.add('toc-active');
      
      var tocEl = document.querySelector('.toc');
      if (tocEl) {
        var linkTop = current.offsetTop;
        var tocHeight = tocEl.clientHeight;
        if (linkTop < tocEl.scrollTop || linkTop > tocEl.scrollTop + tocHeight - 40) {
          tocEl.scrollTop = linkTop - tocHeight / 2;
        }
      }
    }
  }

  function onScroll() {
    var scrollY = window.scrollY + 110;
    var active = null;
    for (var i = 0; i < headings.length; i++) {
      if (headings[i].getBoundingClientRect().top + window.scrollY <= scrollY) {
        active = headings[i];
      }
    }
    if (active) {
      var id = active.id;
      var link = links.find(function (a) {
        return a.getAttribute('href') === '#' + id;
      });
      setActive(link || null);
    } else {
      setActive(null);
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll(); 
})();
</script>


<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
