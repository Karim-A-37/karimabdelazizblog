baseURL = "https://karimabdelazizblog.tech/"
languageCode = "en-us"
title = "Karim's Blog"
theme = "PaperMod"
paginate = 6

[params]
  author = "Karim Abdelaziz"
  description = "Notes, writeups and projects"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "Hey, I'm Karim Abdelaziz"
    Content = "Notes, writeups and projects."

  # ── Social links (shown as icons on your homepage) ──────────
  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/YOUR-GITHUB-USERNAME"

  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://linkedin.com/in/YOUR-LINKEDIN-USERNAME"

  [[params.socialIcons]]
    name = "hackthebox"
    url  = "https://app.hackthebox.com/profile/YOUR-HTB-ID"

[menu]
  [[menu.main]]
    name = "About"
    url  = "/about/"
    weight = 10
  [[menu.main]]
    name = "Tags"
    url  = "/tags/"
    weight = 20

[taxonomies]
  tag = "tags"