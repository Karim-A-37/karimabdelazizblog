baseURL = "https://karimabdelazizblog.tech/"
locale = "en-us"
title = "Karim's Blog"
theme = "PaperMod"
paginate = 6

[params]
  author = "Karim Abdelaziz"
  description = "Notes, writeups and projects"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "Hey, I'm Karim Abdelaziz"
    Content = "Security notes, CTF writeups, and tech projects."

  # ── Social links (shown as icons on your homepage) ──────────
  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/Karim-A-37"

  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://linkedin.com/in/karim-abdelaziz-359b63360"

  [[params.socialIcons]]
    name = "hackthebox"
    url  = "https://profile.hackthebox.com/profile/019daf59-087e-71ba-9ae1-58ab43a8a4c8"

  [[params.socialIcons]]
    name = "tryhackme"
    url  = "https://tryhackme.com/p/JaGuar"

  [[params.socialIcons]]
    name = "hackerone"
    url  = "https://hackerone.com/2f4ces"

  [[params.socialIcons]]
    name = "codeforces"
    url  = "https://codeforces.com/profile/2_f4ces"

  [[params.socialIcons]]
    name = "leetcode"
    url  = "https://leetcode.com/u/Karim_A_1117/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style              = "monokai"
    lineNos            = true
    lineNumbersInTable = false
    noClasses          = true
    guessSyntax        = true

[menu]
  [[menu.main]]
    name = "About"
    url  = "/about/"
    weight = 10
  [[menu.main]]
    name = "Tags"
    url  = "/tags/"
    weight = 20

[taxonomies]
  tag = "tags"